[preset: nucleus_buildbot_macos,no_test]
host-cc=%(host_cc)s
host-cxx=%(host_cxx)s
compiler-vendor=apple
release
test=0
validation-test=0
long-test=0
stress-test=0
test-installable-package=
toolchain-benchmarks=0
ios
tvos
watchos
xros
infer-cross-compile-hosts-on-darwin
lldb
no-lldb-assertions
lldb-configure-tests=0
lldb-use-system-debugserver
llbuild
swiftpm
swift-driver
swiftsyntax
swift-testing
swift-testing-macros
indexstore-db
sourcekit-lsp
swiftdocc
swiftformat
wasmkit
install-lldb
install-swiftpm
install-swift-driver
install-swiftsyntax
install-swift-testing
install-swift-testing-macros
install-sourcekit-lsp
install-swiftdocc
install-swiftformat
install-wasmkit
install-prefix=/usr
install-destdir=%(install_destdir)s
install-llvm
install-swift
install-llbuild
build-swift-stdlib-unittest-extra=0
build-embedded-stdlib=1
build-embedded-stdlib-cross-compiling=1
build-wasi-stdlib=0
extra-llvm-cmake-options=
    -DLLVM_CCACHE_BUILD:BOOL=ON
    -DLLVM_ENABLE_ASSERTIONS:BOOL=FALSE
extra-swift-cmake-options=
    -DSWIFT_ENABLE_ASSERTIONS:BOOL=FALSE
    -DSWIFTSYNTAX_ENABLE_ASSERTIONS:BOOL=FALSE
llbuild-cmake-options=
    -DBUILD_TESTING:BOOL=FALSE
